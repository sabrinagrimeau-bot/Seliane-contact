<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Séliane – Ajouter le contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bleu: #1B3A5C;
      --azur: #4A90C4;
      --vert: #6BBFB5;
      --terra: #C4785A;
      --blanc: #F7F4EF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: var(--blanc);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      overflow: hidden;
    }

    /* Background doux */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(107,191,181,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(74,144,196,0.12) 0%, transparent 60%);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: white;
      border-radius: 24px;
      padding: 52px 44px 44px;
      max-width: 380px;
      width: 90vw;
      text-align: center;
      box-shadow: 0 8px 48px rgba(27,58,92,0.10), 0 2px 12px rgba(27,58,92,0.06);
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-ring {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--vert), var(--azur));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 4px 16px rgba(107,191,181,0.35);
    }

    .logo-ring svg {
      width: 36px;
      height: 36px;
      fill: white;
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--bleu);
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }

    .tagline {
      font-size: 12px;
      color: var(--azur);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 32px;
      font-weight: 300;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, var(--vert), var(--azur));
      border-radius: 2px;
      margin: 0 auto 28px;
    }

    .message {
      font-size: 14px;
      color: #666;
      line-height: 1.7;
      margin-bottom: 32px;
      font-weight: 300;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--bleu), var(--azur));
      color: white;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.03em;
      box-shadow: 0 4px 20px rgba(27,58,92,0.25);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      border: none;
      font-family: 'Lato', sans-serif;
    }

    .btn:active {
      transform: scale(0.97);
      box-shadow: 0 2px 10px rgba(27,58,92,0.2);
    }

    .btn svg {
      width: 18px;
      height: 18px;
      fill: white;
      flex-shrink: 0;
    }

    .info {
      margin-top: 24px;
      font-size: 11px;
      color: #aaa;
      line-height: 1.6;
    }

    .info a {
      color: var(--azur);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-ring">
      <!-- Person icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
      </svg>
    </div>

    <div class="brand">Sabrina Grimeau</div>
    <div class="tagline">Séliane Growth Consulting</div>
    <div class="divider"></div>

    <p class="message">
      Enregistrez mes coordonnées directement dans vos contacts 📲
    </p>

    <a class="btn" href="https://raw.githubusercontent.com/sabrinagrimeau-bot/Seliane-contact/main/Seliane_carte_de_visite.vcf" download="Seliane_carte_de_visite.vcf">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 2h14v2H5v-2z"/>
      </svg>
      Ajouter à mes contacts
    </a>

    <p class="info">
      Consultante RH · QVCT · Martinique<br/>
      <a href="mailto:contact@selianegrowth.fr">contact@selianegrowth.fr</a>
    </p>
  </div>
</body>
</html>
